<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メモリ上テキスト保存ツール</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 40px;
}
textarea {
width: 100%;
height: 200px;
margin-bottom: 10px;
font-size: 16px;
padding: 10px;
box-sizing: border-box;
}
button {
font-size: 16px;
padding: 10px 20px;
margin-right: 10px;
cursor: pointer;
}
#savedTexts {
margin-top: 20px;
border-top: 1px solid #ccc;
padding-top: 10px;
}
.textItem {
border-bottom: 1px dashed #aaa;
padding: 5px 0;
}
</style>
</head>
<body>
<h1>メモリ上テキスト保存ツール</h1>

<textarea id="inputText" placeholder="ここにテキストを入力"></textarea><br>

<button onclick="saveText()">保存</button>
<button onclick="clearAll()">すべてクリア</button>

<div id="savedTexts">
<h2>保存済みテキスト</h2>
<div id="textList"></div>
</div>

<script>
// メモリ上の保存用配列
let memoryStorage = [];

function saveText() {
const input = document.getElementById('inputText').value.trim();
if (input === "") {
alert("テキストを入力してください");
return;
}
memoryStorage.push(input);
document.getElementById('inputText').value = "";
renderSavedTexts();
}

function renderSavedTexts() {
const listDiv = document.getElementById('textList');
listDiv.innerHTML = "";
memoryStorage.forEach((text, index) => {
const div = document.createElement('div');
div.className = "textItem";
div.textContent = text;
listDiv.appendChild(div);
});
}

function clearAll() {
if (confirm("本当にすべてクリアしますか？")) {
memoryStorage = [];
renderSavedTexts();
}
}
</script>
</body>
</html>
