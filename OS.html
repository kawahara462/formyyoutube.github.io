<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Virtual Web OS</title>

<style>

body{
margin:0;
background:#0b3d91;
font-family:sans-serif;
overflow:hidden;
}

.desktop{
position:absolute;
top:0;
left:0;
right:0;
bottom:40px;
display:flex;
flex-wrap:wrap;
padding:10px;
gap:15px;
}

.icon{
width:80px;
text-align:center;
color:white;
cursor:pointer;
}

.icon img{
width:48px;
height:48px;
}

.window{
position:absolute;
background:white;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
display:none;
flex-direction:column;
overflow:hidden;
}

.titlebar{
height:40px;
background:#eee;
display:flex;
align-items:center;
padding:5px;
cursor:grab;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
margin-right:6px;
}

.red{background:#ff5f57}
.yellow{background:#ffbd2e}
.green{background:#28c840}

.content{
flex:1;
overflow:auto;
padding:10px;
}

.taskbar{
position:absolute;
bottom:0;
left:0;
right:0;
height:40px;
background:#222;
display:flex;
align-items:center;
padding:5px;
color:white;
}

textarea{width:100%}
table{border-collapse:collapse}

td{
border:1px solid #aaa;
width:80px;
height:30px;
}

</style>
</head>

<body>

<div id="desktop" class="desktop"></div>
<div id="windows"></div>
<div class="taskbar">Virtual Web OS</div>

<script>

const desktop=document.getElementById("desktop")
const windows=document.getElementById("windows")

let z=10

function createIcon(app){

let icon=document.createElement("div")
icon.className="icon"

icon.innerHTML=`
<img src="${app.icon}">
<br>${app.name}
`

icon.onclick=()=>openApp(app.id)

desktop.appendChild(icon)

}

function createWindow(app){

let win=document.createElement("div")
win.className="window"
win.id=app.id

win.style.width="720px"
win.style.height="520px"
win.style.left="120px"
win.style.top="80px"

win.innerHTML=`

<div class="titlebar" onmousedown="dragStart(event,this)">
<div class="dot red" onclick="closeWin('${app.id}')"></div>
<div class="dot yellow" onclick="closeWin('${app.id}')"></div>
<div class="dot green"></div>
<div style="margin-left:10px">${app.name}</div>
</div>

<div class="content">
${app.content}
</div>
`

windows.appendChild(win)

}

function openApp(id){

let w=document.getElementById(id)
w.style.display="flex"
w.style.zIndex=++z

}

function closeWin(id){

document.getElementById(id).style.display="none"

}

function dragStart(e,bar){

let win=bar.parentElement

let ox=e.clientX-win.offsetLeft
let oy=e.clientY-win.offsetTop

function move(ev){

win.style.left=(ev.clientX-ox)+"px"
win.style.top=(ev.clientY-oy)+"px"

}

function stop(){

document.removeEventListener("mousemove",move)
document.removeEventListener("mouseup",stop)

}

document.addEventListener("mousemove",move)
document.addEventListener("mouseup",stop)

}

/* ======================
アプリ定義
====================== */

const apps=[

{
id:"notepad",
name:"メモ帳",
icon:"https://cdn-icons-png.flaticon.com/512/942/942748.png",
content:`

<textarea id="memo" style="height:80%"></textarea>
<button onclick="saveMemo()">保存</button>

`
},

{
id:"program",
name:"PROGRAM",
icon:"https://cdn-icons-png.flaticon.com/512/1006/1006555.png",
content:`

HTML
<textarea id="htmlCode"></textarea>

JS
<textarea id="jsCode"></textarea>

<button onclick="runProgram()">実行</button>

<iframe id="result" style="width:100%;height:200px"></iframe>

`
},

{
id:"sheet",
name:"シート",
icon:"https://cdn-icons-png.flaticon.com/512/2920/2920277.png",
content:`
<table id="sheetTable"></table>
<button onclick="saveSheet()">CSV保存</button>
`
},

{
id:"browser",
name:"ブラウザ",
icon:"https://cdn-icons-png.flaticon.com/512/891/891175.png",
content:`

<input id="url" style="width:80%">
<button onclick="openURL()">開く</button>

<iframe id="browserFrame" style="width:100%;height:400px"></iframe>

`
},

{
id:"camera",
name:"カメラ",
icon:"https://cdn-icons-png.flaticon.com/512/685/655721.png",
content:`

<video id="video" width="400" autoplay></video>

<button onclick="startCamera()">開始</button>
<button onclick="takePhoto()">撮影</button>

<br>

<canvas id="photo" width="400" height="300"></canvas>

`
},

{
id:"ext",
name:"拡張子変更",
icon:"https://cdn-icons-png.flaticon.com/512/833/833524.png",
content:`

<input type="file" id="fileChange">

新しい拡張子
<input id="newExt">

<button onclick="changeExt()">変更</button>

`
},

{
id:"appmaker",
name:"APPMAKER",
icon:"https://cdn-icons-png.flaticon.com/512/2721/2721297.png",
content:`

<h3>APPMAKER</h3>

アプリ名
<input id="appName">

HTMLコード
<textarea id="appHTML" style="height:200px"></textarea>

<button onclick="buildApp()">VAPPビルド & ダウンロード</button>

`
},

{
id:"store",
name:"アプリストア",
icon:"https://cdn-icons-png.flaticon.com/512/263/263142.png",
content:`

<h3>公式アプリ</h3>

<button onclick="openOfficialApps()">
公式サイトはこちら
</button>

<br><br>

<h3>VAPPインストール</h3>

<input type="file" id="appUpload">

<button onclick="installVAPP()">インストール</button>

<div id="storeLog"></div>

`
}

]

apps.forEach(app=>{
createIcon(app)
createWindow(app)
})

/* ======================
メモ帳
====================== */

function saveMemo(){

let blob=new Blob([memo.value],{type:"text/plain"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="memo.txt"

document.body.appendChild(a)
a.click()
a.remove()

URL.revokeObjectURL(url)

}

/* ======================
PROGRAM
====================== */

function runProgram(){

result.srcdoc=`
${htmlCode.value}
<script>
${jsCode.value}
<\/script>
`

}

/* ======================
シート
====================== */

let table=document.getElementById("sheetTable")

for(let y=0;y<20;y++){

let tr=document.createElement("tr")

for(let x=0;x<10;x++){

let td=document.createElement("td")
td.contentEditable=true

tr.appendChild(td)

}

table.appendChild(tr)

}

function saveSheet(){

let csv=""

for(let r of table.rows){

let row=[]

for(let c of r.cells){

row.push(c.innerText)

}

csv+=row.join(",")+"\\n"

}

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="sheet.csv"

document.body.appendChild(a)
a.click()
a.remove()

URL.revokeObjectURL(url)

}

/* ======================
ブラウザ
====================== */

function openURL(){

let u=url.value

if(!u.startsWith("http"))
u="https://"+u

browserFrame.src=u

}

/* ======================
カメラ
====================== */

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
video.srcObject=stream
})

}

function takePhoto(){

let ctx=photo.getContext("2d")
ctx.drawImage(video,0,0,400,300)

}

/* ======================
拡張子変更
====================== */

function changeExt(){

let file=fileChange.files[0]

let name=file.name.split(".")[0]

let newName=name+"."+newExt.value

let url=URL.createObjectURL(file)

let a=document.createElement("a")

a.href=url
a.download=newName

document.body.appendChild(a)
a.click()
a.remove()

URL.revokeObjectURL(url)

}

/* ======================
APPMAKER
====================== */

function buildApp(){

let name=document.getElementById("appName").value.trim()

if(!name){
alert("アプリ名を入力")
return
}

let html=document.getElementById("appHTML").value

let obj={
name:name,
html:btoa(unescape(encodeURIComponent(html)))
}

let blob=new Blob([JSON.stringify(obj)],{type:"application/octet-stream"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download=name+".vapp"

document.body.appendChild(a)
a.click()
a.remove()

URL.revokeObjectURL(url)

}

/* ======================
VAPPインストール
====================== */

function installVAPP(){

let file=appUpload.files[0]

let reader=new FileReader()

reader.onload=function(){

let data=JSON.parse(reader.result)

let html=decodeURIComponent(escape(atob(data.html)))

let id="app"+Date.now()

let app={
id:id,
name:data.name,
icon:"https://cdn-icons-png.flaticon.com/512/565/565547.png",
content:`<iframe style="width:100%;height:100%" srcdoc="${html.replace(/"/g,'&quot;')}"></iframe>`
}

createIcon(app)
createWindow(app)

storeLog.innerHTML+="インストール成功<br>"

}

reader.readAsText(file)

}

/* ======================
公式サイト
====================== */

function openOfficialApps(){

window.open(
"https://github.com/kawahara462/APPS",
"_blank"
)

}

</script>
</body>
</html>
