<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>仮想OS 完全版</title>
<style>
body { margin:0; font-family:sans-serif; background:#3498db; color:#fff; }
#desktop { position:relative; width:100vw; height:100vh; background:#2980b9; overflow:hidden; }
.app-icon { width:80px; text-align:center; display:inline-block; margin:10px; cursor:pointer; }
.app-icon img { width:64px; height:64px; }
.window { position:absolute; border:1px solid #000; background:#fff; color:#000; min-width:300px; min-height:200px; display:none; flex-direction:column; z-index:1000; }
.window-header { background:#555; color:#fff; padding:5px; cursor:move; display:flex; justify-content:space-between; align-items:center; }
.window-content { flex:1; padding:5px; overflow:auto; }
.window-buttons button { margin-left:2px; }
#taskbar { position:absolute; bottom:0; left:0; width:100%; height:30px; background:#333; display:flex; align-items:center; }
.taskbar-item { color:#fff; padding:0 5px; cursor:pointer; margin-right:2px; background:#555; border-radius:2px; }
input, button, textarea { font-family:sans-serif; }
table { border-collapse: collapse; width:100%; }
table td, table th { border:1px solid #ccc; padding:2px; min-width:40px; text-align:center; }
</style>
</head>
<body>
<div id="desktop"></div>
<div id:taskbar></div>

<script>
const desktop = document.getElementById('desktop');
const taskbar = document.getElementById('taskbar');

// ===== デスクトップアイコン =====
const apps = [
  { name:'メモ帳', icon:'📝', id:'notepad', run:openNotepad },
  { name:'シート', icon:'📊', id:'sheet', run:openSheet },
  { name:'JSONエディタ', icon:'🗄️', id:'jsoneditor', run:openJSONEditor },
  { name:'時計', icon:'⏰', id:'clock', run:openClock },
  { name:'電卓', icon:'🔢', id:'calc', run:openCalc },
  { name:'関数電卓', icon:'📈', id:'funcalc', run:openFuncalc },
  { name:'カメラ', icon:'📷', id:'camera', run:openCamera },
  { name:'拡張子変更', icon:'📂', id:'extchanger', run:openExtChanger },
  { name:'APPMAKER', icon:'⚙️', id:'appmaker', run:openAppMaker },
  { name:'アプリストア', icon:'🏪', id:'appstore', run:openAppStore },
];

apps.forEach(a=>{
  const div=document.createElement('div');
  div.className='app-icon';
  div.id='icon-'+a.id;
  div.innerHTML=`<div>${a.icon}</div><div>${a.name}</div>`;
  div.onclick=()=>a.run();
  desktop.appendChild(div);
});

// ===== タスクバー管理 =====
let taskWindows = {};
function addToTaskbar(id, name, win){
  if(taskWindows[id]) return;
  const btn = document.createElement('div');
  btn.className='taskbar-item';
  btn.textContent=name;
  btn.onclick=()=>{ toggleWindow(win); };
  taskbar.appendChild(btn);
  taskWindows[id]=win;
}
function toggleWindow(win){
  if(win.style.display==='none') win.style.display='flex';
  else win.style.display='none';
}

// ===== ウィンドウ作成共通 =====
function createWindow(title,width=400,height=300){
  const win=document.createElement('div');
  win.className='window';
  win.style.width=width+'px';
  win.style.height=height+'px';
  win.style.left='50px';
  win.style.top='50px';
  win.style.display='flex';
  const header=document.createElement('div');
  header.className='window-header';
  header.innerHTML=`<span>${title}</span>`;
  const btns=document.createElement('div');
  btns.className='window-buttons';
  const closeBtn=document.createElement('button'); closeBtn.textContent='✖'; closeBtn.onclick=()=>{ win.style.display='none'; };
  btns.appendChild(closeBtn);
  header.appendChild(btns);
  win.appendChild(header);
  const content=document.createElement('div'); content.className='window-content';
  win.appendChild(content);
  desktop.appendChild(win);

  // ドラッグ
  let offsetX=0, offsetY=0, isDown=false;
  header.onmousedown=(e)=>{ isDown=true; offsetX=e.offsetX; offsetY=e.offsetY; }
  document.onmouseup=()=>{ isDown=false; }
  document.onmousemove=(e)=>{ if(isDown){ win.style.left=(e.clientX-offsetX)+'px'; win.style.top=(e.clientY-offsetY)+'px'; } }
  return {win,content};
}

// ===== メモ帳 =====
function openNotepad(){
  const {win,content}=createWindow('メモ帳');
  const ta=document.createElement('textarea'); ta.style.width='100%'; ta.style.height='80%'; content.appendChild(ta);
  const saveBtn=document.createElement('button'); saveBtn.textContent='TXT保存'; saveBtn.onclick=()=>{
    const blob = new Blob([ta.value], {type:'text/plain'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='memo.txt'; a.click();
  };
  content.appendChild(saveBtn);
  addToTaskbar('notepad','メモ帳',win);
}

// ===== シートアプリ =====
let sheetData=[['']];
function openSheet(){
  const {win,content}=createWindow('シート');
  const table=document.createElement('table');
  const renderTable=()=>{
    table.innerHTML='';
    sheetData.forEach((row,rowi)=>{
      const tr=document.createElement('tr');
      row.forEach((cell,coli)=>{
        const td=document.createElement('td');
        const inp=document.createElement('input');
        inp.value=cell;
        inp.oninput=(e)=>{ sheetData[rowi][coli]=e.target.value; };
        td.appendChild(inp);
        tr.appendChild(td);
      });
      table.appendChild(tr);
    });
  };
  renderTable();
  content.appendChild(table);
  const btnAddRow=document.createElement('button'); btnAddRow.textContent='行追加';
  btnAddRow.onclick=()=>{ sheetData.push(new Array(sheetData[0].length).fill('')); renderTable(); };
  const btnAddCol=document.createElement('button'); btnAddCol.textContent='列追加';
  btnAddCol.onclick=()=>{ sheetData.forEach(r=>r.push('')); renderTable(); };
  const btnSave=document.createElement('button'); btnSave.textContent='保存'; btnSave.onclick=()=>{
    localStorage.setItem('sheetData',JSON.stringify(sheetData));
    alert('保存しました');
  };
  const btnLoad=document.createElement('button'); btnLoad.textContent='読み込み'; btnLoad.onclick=()=>{
    const data=localStorage.getItem('sheetData'); if(data){ sheetData=JSON.parse(data); renderTable(); }
  };
  content.appendChild(btnAddRow); content.appendChild(btnAddCol); content.appendChild(btnSave); content.appendChild(btnLoad);
  addToTaskbar('sheet','シート',win);
}

// ===== JSONエディタ =====
function openJSONEditor(){
  const {win,content}=createWindow('JSONエディタ');
  const ta=document.createElement('textarea'); ta.style.width='100%'; ta.style.height='80%'; content.appendChild(ta);
  const btnSave=document.createElement('button'); btnSave.textContent='JSON保存'; btnSave.onclick=()=>{
    try{ const obj=JSON.parse(ta.value); const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='data.json'; a.click(); }
    catch(e){ alert('JSONエラー'); }
  };
  content.appendChild(btnSave);
  addToTaskbar('jsoneditor','JSONエディタ',win);
}

// ===== 時計 =====
function openClock(){
  const {win,content}=createWindow('時計',200,100);
  const div=document.createElement('div'); div.style.fontSize='24px'; content.appendChild(div);
  setInterval(()=>{ const d=new Date(); div.textContent=d.toLocaleTimeString(); },1000);
  addToTaskbar('clock','時計',win);
}

// ===== 電卓 =====
function openCalc(){
  const {win,content}=createWindow('電卓');
  const inp=document.createElement('input'); inp.type='text'; inp.style.width='100%'; content.appendChild(inp);
  const btn=document.createElement('button'); btn.textContent='=';
  btn.onclick=()=>{ try{ inp.value=eval(inp.value); }catch(e){ alert('計算エラー'); } };
  content.appendChild(btn);
  addToTaskbar('calc','電卓',win);
}

// ===== 関数電卓 =====
function openFuncalc(){
  const {win,content}=createWindow('関数電卓');
  const inp=document.createElement('input'); inp.style.width='100%'; content.appendChild(inp);
  const btn=document.createElement('button'); btn.textContent='計算';
  btn.onclick=()=>{ try{ inp.value=Function('"use strict";return ('+inp.value+')')(); }catch(e){ alert('計算エラー'); } };
  content.appendChild(btn);
  addToTaskbar('funcalc','関数電卓',win);
}

// ===== カメラ =====
function openCamera(){
  const {win,content}=createWindow('カメラ');
  const video=document.createElement('video'); video.autoplay=true; content.appendChild(video);
  navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{ video.srcObject=stream; });
  addToTaskbar('camera','カメラ',win);
}

// ===== 拡張子変更 =====
function openExtChanger(){
  const {win,content}=createWindow('拡張子変更');
  const fileInp=document.createElement('input'); fileInp.type='file'; content.appendChild(fileInp);
  const newExt=document.createElement('input'); newExt.placeholder='新しい拡張子'; content.appendChild(newExt);
  const btn=document.createElement('button'); btn.textContent='変換';
  btn.onclick=()=>{
    if(fileInp.files.length===0){ alert('ファイル選択'); return; }
    const f=fileInp.files[0]; const blob=f.slice(0,f.size,'application/octet-stream');
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    let name=f.name.split('.').slice(0,-1).join('.')+'.'+newExt.value;
    a.download=name; a.click();
  };
  content.appendChild(btn);
  addToTaskbar('extchanger','拡張子変更',win);
}

// ===== APPMAKER =====
function openAppMaker(){
  const {win,content}=createWindow('APPMAKER');
  const ta=document.createElement('textarea'); ta.style.width='100%'; ta.style.height='70%'; content.appendChild(ta);
  const btnBuild=document.createElement('button'); btnBuild.textContent='VAPP生成';
  btnBuild.onclick=()=>{
    const code=ta.value;
    const vapp=obfuscate(code);
    const blob=new Blob([vapp],{type:'application/octet-stream'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='app.vapp'; a.click();
  };
  content.appendChild(btnBuild);
  addToTaskbar('appmaker','APPMAKER',win);
}

// 簡易難読化
function obfuscate(str){ return btoa(str); }

// ===== APPSTORE =====
function openAppStore(){
  const {win,content}=createWindow('アプリストア');
  const fileInp=document.createElement('input'); fileInp.type='file'; fileInp.accept='.vapp'; content.appendChild(fileInp);
  const btnInstall=document.createElement('button'); btnInstall.textContent='インストール';
  btnInstall.onclick=()=>{
    if(fileInp.files.length===0){ alert('VAPP選択'); return; }
    const file=fileInp.files[0];
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const html=atob(reader.result); // VAPP→HTML変換
        const blob=new Blob([html],{type:'text/html'});
        const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file.name.replace('.vapp','.html'); a.click();
        alert('仮想OSにインストール完了（HTML化）');
      }catch(e){ alert('インストール失敗'); }
    };
    reader.readAsText(file);
  };
  content.appendChild(btnInstall);

  // 公式サイトリンク
  const link=document.createElement('a'); link.href='https://github.com/kawahara462/APPS'; link.target='_blank'; link.textContent='公式サイトはこちら';
  content.appendChild(document.createElement('br'));
  content.appendChild(link);

  addToTaskbar('appstore','アプリストア',win);
}
</script>
</body>
</html>
